<!DOCTYPE html>
<html lang="fa">
<head>
    <meta charset="UTF-8">
    <title>آشنایی با کتابخانه ها</title>
    <style>
        body {
            direction: rtl;
            font-family: "Vazirmatn", sans-serif;
            background: linear-gradient(to bottom right, #f9f9f9, #e0f7fa);
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            background: linear-gradient(135deg, #e0f7fa, #80deea);
            background-attachment: fixed;
        }

        #welcome-message {
            font-size: 2.5rem;
            color: #333;
            margin-bottom: 2rem;
            text-shadow: 1px 1px 2px #ccc;
        }

        #next-button {
            background-color: #009688;
            color: white;
            text-decoration: none;
            padding: 12px 30px;
            border-radius: 8px;
            font-size: 1.1rem;
            transition: background-color 0.3s ease, transform 0.2s ease;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        #next-button:hover {
            background-color: #00796b;
            transform: translateY(-2px);
        }
    </style>
</head>
<body>
    <h1 id="welcome-message">به سایت آشنایی با ماژول‌ها خوش آمدید</h1>
    <a id="next-button" href="./1.html">برو به صفحه بعد</a>
</body>
</html>
